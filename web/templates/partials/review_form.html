{{define "review_form.html"}}
<div class="space-y-4">
  <form method="POST" action="/admin/events/{{.ID}}/approve" class="inline">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="approve_comment">
        Approval Note <span class="text-gray-400 font-normal">(optional)</span>
      </label>
      <input id="approve_comment" name="admin_comment" type="text"
             placeholder="e.g. Great proposal, approved!"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-green-500 mb-3">
    </div>
    <button type="submit"
            class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition-colors">
      ✓ Approve Event
    </button>
  </form>

  <div class="border-t pt-4">
    <form method="POST" action="/admin/events/{{.ID}}/reject" class="space-y-3">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="reject_comment">
          Rejection Reason <span class="text-red-500">*</span>
        </label>
        <textarea id="reject_comment" name="admin_comment" rows="3" required
                  placeholder="Explain why the event is being rejected and what changes are needed…"
                  class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-400"></textarea>
      </div>
      <button type="submit"
              class="w-full sm:w-auto bg-red-600 hover:bg-red-700 text-white text-sm font-medium px-6 py-2 rounded-lg transition-colors">
        ✗ Reject Event
      </button>
    </form>
  </div>
</div>
{{end}}
