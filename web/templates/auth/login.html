{{define "title"}}Sign In{{end}}

{{define "content"}}
<div class="min-h-[70vh] flex items-center justify-center">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <img src="/static/logo.png" alt="IPN Southeast" class="h-20 w-auto mx-auto mb-4" onerror="this.style.display='none'">
      <h1 class="text-2xl font-bold text-gray-900">IPN Events</h1>
      <p class="text-gray-500 text-sm mt-1">Sign in to your account</p>
    </div>

    {{if eq .Data.Error "invalid"}}
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-red-800 text-sm">
      Invalid email or password.
    </div>
    {{end}}

    <form method="POST" action="/login" class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email</label>
        <input id="email" name="email" type="email" required autocomplete="email"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password</label>
        <input id="password" name="password" type="password" required autocomplete="current-password"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent">
      </div>
      <button type="submit"
              class="w-full bg-blue-700 hover:bg-blue-800 text-white font-medium py-2 px-4 rounded-lg text-sm transition-colors">
        Sign in
      </button>
    </form>
  </div>
</div>
{{end}}
