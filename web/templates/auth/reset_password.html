{{define "title"}}Reset Password{{end}}

{{define "content"}}
<div class="min-h-screen flex items-center justify-center bg-gray-50 px-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Set New Password</h1>
      <p class="mt-1 text-sm text-gray-500">Choose a new password for your account.</p>
    </div>

    {{if .Data.Error}}
    <div class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
      {{.Data.Error}}
      <div class="mt-3">
        <a href="/login" class="font-medium text-red-700 underline">Back to login</a>
      </div>
    </div>
    {{else}}
    <div class="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
      <form method="POST" action="/reset-password/{{.Data.Token}}" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="password">New Password</label>
          <input id="password" name="password" type="password" required minlength="8"
                 placeholder="Min. 8 characters"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1" for="confirm">Confirm Password</label>
          <input id="confirm" name="confirm" type="password" required minlength="8"
                 placeholder="Repeat password"
                 class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
        <button type="submit"
                class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
          Set Password & Sign In
        </button>
      </form>
    </div>
    {{end}}
  </div>
</div>
{{end}}
