{{define "title"}}Reset Password{{end}}

{{define "content"}}
<div class="max-w-md mx-auto">
  <div class="mb-6">
    <a href="/admin/users" class="text-sm text-indigo-600 hover:underline">← Back to Team Members</a>
  </div>

  <div class="card-static p-6">
    <h1 class="text-lg font-semibold text-gray-900 mb-1">Reset Password</h1>
    <p class="text-sm text-gray-500 mb-5">
      Set a new password for <span class="font-medium text-gray-700">{{.Data.Name}}</span>
      (<span class="text-gray-500">{{.Data.Email}}</span>).
    </p>

    <form method="POST" action="/admin/users/{{.Data.ID}}/reset-password" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1" for="password">New Password</label>
        <input id="password" name="password" type="password" required minlength="8"
               placeholder="Min. 8 characters"
               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
      </div>

      <button type="submit"
              class="w-full py-2 px-4 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-medium rounded-lg transition-colors">
        Update Password
      </button>
    </form>
  </div>
</div>
{{end}}
