{{define "title"}}Add User{{end}}

{{define "content"}}
<div class="mb-6 flex items-center justify-between">
  <h1 class="text-2xl font-bold text-gray-900">Add User</h1>
  <a href="/admin/users" class="text-sm text-gray-500 hover:text-gray-700">← Back</a>
</div>

<form method="POST" action="/admin/users" class="bg-white rounded-xl border border-gray-200 shadow-sm p-6 space-y-4 max-w-md">
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Full Name <span class="text-red-500">*</span></label>
    <input id="name" name="name" type="text" required
           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" for="email">Email <span class="text-red-500">*</span></label>
    <input id="email" name="email" type="email" required
           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" for="password">Password <span class="text-red-500">*</span></label>
    <input id="password" name="password" type="password" required minlength="8"
           class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
    <p class="text-xs text-gray-400 mt-1">Minimum 8 characters.</p>
  </div>
  <div>
    <label class="block text-sm font-medium text-gray-700 mb-1" for="role">Role <span class="text-red-500">*</span></label>
    <select id="role" name="role" required
            class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
      <option value="team_member">Team Member — can submit and manage events</option>
      <option value="viewer">Read-Only Viewer — can view Calendar and Roadmap only</option>
    </select>
  </div>
  <div class="flex justify-end gap-3 pt-2">
    <a href="/admin/users" class="px-4 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</a>
    <button type="submit" class="px-5 py-2 text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 rounded-lg transition-colors">
      Create Account
    </button>
  </div>
</form>
{{end}}
