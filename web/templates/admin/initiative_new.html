{{define "title"}}New Strategic Initiative{{end}}

{{define "content"}}
<div class="mb-6 flex items-center justify-between">
  <div>
    <h1 class="text-2xl font-bold text-gray-900">New Strategic Initiative</h1>
    <p class="text-gray-500 text-sm mt-1">Define an initiative that team members can tag to their events.</p>
  </div>
  <a href="/admin/initiatives" class="text-sm text-gray-500 hover:text-gray-700">&larr; Back</a>
</div>

<form method="POST" action="/admin/initiatives" enctype="multipart/form-data" class="space-y-6">

  <section class="card-static p-6 space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Name <span class="text-red-500">*</span></label>
      <input id="name" name="name" type="text" required placeholder="e.g. Youth Empowerment"
             class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1" for="objective">Objective <span class="text-red-500">*</span></label>
      <textarea id="objective" name="objective" rows="4" required
                placeholder="Describe the strategic objective of this initiative..."
                class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-600"></textarea>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Supporting Documents <span class="text-gray-400 font-normal">(optional)</span></label>
      <input type="file" name="documents" multiple
             class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
      <p class="text-xs text-gray-400 mt-1">Max 32 MB per file. You can upload more documents later.</p>
    </div>
  </section>

  <div class="flex justify-end gap-3">
    <a href="/admin/initiatives" class="px-5 py-2 text-sm text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50">Cancel</a>
    <button type="submit" class="px-6 py-2 text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 rounded-lg transition-colors">Create Initiative</button>
  </div>
</form>
{{end}}
